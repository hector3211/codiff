name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    env:
      ARTIFACT: codiff-linux-x86_64.tar.gz
      BIN: codiff

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        run: |
          mkdir dist
          cp "target/release/${BIN}" dist/
          tar -czf "${ARTIFACT}" -C dist "${BIN}"

      - name: Upload release asset (PAT)
        if: ${{ secrets.RELEASE_PAT != '' }}
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
        with:
          files: ${{ env.ARTIFACT }}

      - name: Upload release asset (GITHUB_TOKEN)
        if: ${{ secrets.RELEASE_PAT == '' }}
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          files: ${{ env.ARTIFACT }}
